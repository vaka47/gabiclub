name: Public Healthcheck

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

concurrency:
  group: public-healthcheck
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check public frontend
        run: |
          set -euo pipefail
          curl -fsS --retry 3 --retry-delay 5 --retry-all-errors --max-time 20 \
            -o /dev/null -w 'frontend code=%{http_code} time=%{time_total}\n' \
            https://gabiclub.ru/trainings

      - name: Check public API
        run: |
          set -euo pipefail
          curl -fsS --retry 3 --retry-delay 5 --retry-all-errors --max-time 20 \
            -o /dev/null -w 'api code=%{http_code} time=%{time_total}\n' \
            https://api.gabiclub.ru/api/trainings/meta/

      - name: Check production admin HTML
        run: |
          set -euo pipefail
          curl -fsS --retry 3 --retry-delay 5 --retry-all-errors --max-time 20 \
            -o /dev/null -w 'admin html code=%{http_code} time=%{time_total}\n' \
            https://admin.gabiclub.ru/admin/login/

      - name: Check production admin CSS
        run: |
          set -euo pipefail
          curl -fsS --retry 3 --retry-delay 5 --retry-all-errors --max-time 20 \
            -o /dev/null -w 'admin css code=%{http_code} type=%{content_type} time=%{time_total}\n' \
            https://admin.gabiclub.ru/static/admin/css/base.css
