name: Frontend Production Smoke Check

on:
  workflow_dispatch: {}

jobs:
  smoke-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Explain production deploy path
        run: |
          echo 'Production deploy is now pull-based from the server timer gabiclub-autodeploy.timer.'
          echo 'This manual workflow only performs a public smoke check.'

      - name: Check public frontend
        run: |
          set -euo pipefail
          curl -fsS --retry 3 --retry-delay 5 --retry-all-errors --max-time 20 \
            -o /dev/null -w 'frontend code=%{http_code} time=%{time_total}\n' \
            https://gabiclub.ru/trainings

      - name: Check public API
        run: |
          set -euo pipefail
          curl -fsS --retry 3 --retry-delay 5 --retry-all-errors --max-time 20 \
            -o /dev/null -w 'api code=%{http_code} time=%{time_total}\n' \
            https://api.gabiclub.ru/api/trainings/meta/
